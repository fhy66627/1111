<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HTML学习之旅 | 关卡式闯关教程</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* 主容器 */
        .learning-hub {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.7);
            border-radius: 2rem;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 1.5rem;
        }

        /* 头部 & 进度 */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 1rem;
        }
        h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1E3C72, #2A5298);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .level-badge {
            background: #1e293b;
            color: #facc15;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: inset 0 -1px 0 #334155, 0 4px 8px rgba(0,0,0,0.05);
        }

        /* 关卡卡片区域 */
        .levels-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 0.8rem;
            border-radius: 2rem;
            border: 1px solid #ffffff;
        }
        .level-card {
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #e2e8f0;
            color: #334155;
            flex: 0 0 auto;
        }
        .level-card.active {
            background: #2c3e66;
            color: white;
            border-color: #1e293b;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transform: scale(1.02);
        }
        .level-card.completed {
            background: #10b98120;
            border-left: 4px solid #10b981;
            color: #065f46;
        }
        .level-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
            background: #e2e8f0;
            filter: grayscale(0.1);
        }
        .level-title {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .level-title .status-icon {
            font-size: 1rem;
        }

        /* 游戏主区域: 说明 + 编辑器 + 预览 */
        .game-play-area {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .mission-column {
            flex: 1.2;
            min-width: 260px;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .editor-column {
            flex: 1.8;
            min-width: 320px;
            background: #1e1f2c;
            border-radius: 1.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
        .preview-column {
            flex: 1.5;
            min-width: 280px;
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .mission-header {
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }
        .mission-goal {
            background: #fef9c3;
            padding: 0.75rem;
            border-radius: 1rem;
            margin: 1rem 0;
            font-size: 0.95rem;
            border-left: 5px solid #eab308;
        }
        .hint-box {
            background: #eef2ff;
            padding: 0.75rem;
            border-radius: 1rem;
            color: #1e3a8a;
            font-size: 0.85rem;
        }

        .editor-header {
            background: #0f172a;
            color: #cbd5e1;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        textarea {
            width: 100%;
            height: 280px;
            background: #0f172a;
            color: #e2e8f0;
            border: none;
            font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 1rem;
            resize: vertical;
            outline: none;
            line-height: 1.5;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 1rem;
            background: #1e293b;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.85rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-reset {
            background: #475569;
        }
        .btn-check {
            background: #10b981;
        }
        .preview-header {
            background: #f8fafc;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            color: #0f172a;
        }
        iframe {
            width: 100%;
            height: 320px;
            border: none;
            background: white;
        }
        .feedback {
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 1rem;
            background: #f1f5f9;
            text-align: center;
            font-weight: 500;
        }
        .success-feedback {
            background: #d1fae5;
            color: #065f46;
        }
        .error-feedback {
            background: #fee2e2;
            color: #991b1b;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #475569;
        }

        @media (max-width: 850px) {
            .learning-hub { padding: 1rem; }
            .game-play-area { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="learning-hub">
    <div class="header">
        <h1>🕹️ HTML学习之旅 · 步步为营</h1>
        <div class="level-badge" id="globalLevelBadge">第1关 · 标题与段落</div>
    </div>

    <!-- 动态关卡列表 -->
    <div class="levels-row" id="levelsContainer"></div>

    <!-- 核心学习区域 -->
    <div class="game-play-area">
        <div class="mission-column">
            <div class="mission-header">📜 当前任务</div>
            <div id="missionDescription">加载关卡...</div>
            <div class="mission-goal" id="missionGoal">
                🎯 目标：让页面出现一个一级标题，内容是「我的第一个网页」。
            </div>
            <div class="hint-box" id="hintBox">
                💡 提示：使用 &lt;h1&gt; 标签，例如 &lt;h1&gt;我的第一个网页&lt;/h1&gt;
            </div>
        </div>

        <div class="editor-column">
            <div class="editor-header">✏️ HTML 编辑器 (编写你的代码)</div>
            <textarea id="codeEditor" spellcheck="false" placeholder="&lt;!-- 在此编写 HTML --&gt;
&lt;h1&gt;我的第一个网页&lt;/h1&gt;
&lt;p&gt;我喜欢学习HTML！&lt;/p&gt;"></textarea>
            <div class="action-buttons">
                <button id="runBtn" class="btn-check">▶ 运行并预览</button>
                <button id="checkBtn" class="btn-check">✅ 验证闯关</button>
                <button id="resetCodeBtn" class="btn-reset">⟳ 重置代码</button>
            </div>
        </div>

        <div class="preview-column">
            <div class="preview-header">🔍 实时预览区</div>
            <iframe id="previewFrame" srcdoc="<html><body style='font-family:sans-serif;padding:1rem'>✨ 点击『运行并预览』查看效果</body></html>" title="预览"></iframe>
        </div>
    </div>
    <div id="feedbackMsg" class="feedback"></div>
    <footer>⚡ 每完成一关自动解锁下一关 | 进度自动保存在浏览器中 🎯</footer>
</div>

<script>
    // ---------- 关卡数据库 ----------
    const levels = [
        {   // 关卡 0
            name: "🌱 标题与段落",
            desc: "最基本的HTML元素，构建页面结构。",
            goal: "页面中必须有一个 &lt;h1&gt; 一级标题，且标题文本包含「我的第一个网页」或「HTML学习」。同时必须包含一个 &lt;p&gt; 段落。",
            hint: "使用 <h1>标题文字</h1> 和 <p>段落文字</p>。",
            validator: (doc) => {
                const h1s = doc.querySelectorAll('h1');
                if (h1s.length === 0) return { ok: false, msg: "❌ 没有找到 &lt;h1&gt; 标题，请添加一级标题。" };
                const h1Text = h1s[0].innerText;
                if (!(h1Text.includes('我的第一个网页') || h1Text.includes('HTML学习') || h1Text.includes('学习之旅'))) {
                    return { ok: false, msg: "⚠️ 标题文字需要包含「我的第一个网页」或「HTML学习」。试试看修改吧！" };
                }
                const pTags = doc.querySelectorAll('p');
                if (pTags.length === 0) return { ok: false, msg: "📌 缺少段落标签 &lt;p&gt; ，请添加一个段落。" };
                return { ok: true, msg: "🎉 完美！标题和段落正确，闯关成功！" };
            },
            defaultCode: `<h1>我的第一个网页</h1>\n<p>我正在学习HTML，太有趣了！</p>`
        },
        {   // 关卡 1
            name: "🖼️ 图片与属性",
            desc: "学会使用 img 标签插入图片。",
            goal: "页面中必须包含一个 &lt;img&gt; 标签，并且 src 属性不能为空。建议使用在线示例图片。",
            hint: "使用 <img src='https://picsum.photos/200/100' alt='示例图片'> 来添加一张随机图片。",
            validator: (doc) => {
                const imgs = doc.querySelectorAll('img');
                if (imgs.length === 0) return { ok: false, msg: "🖼️ 没有找到 img 标签，请插入一张图片。" };
                for (let img of imgs) {
                    if (!img.src || img.src === "") return { ok: false, msg: "请为图片设置正确的 src 属性。" };
                }
                return { ok: true, msg: "🎉 图片插入成功！你学会了图片标签！" };
            },
            defaultCode: `<h1>我的图片画廊</h1>\n<p>看看这张漂亮的图片：</p>\n<img src="https://picsum.photos/id/1/200/150" alt="风景">`
        },
        {   // 关卡 2
            name: "🔗 链接与导航",
            desc: "使用 a 标签创建超链接。",
            goal: "页面需包含一个 &lt;a&gt; 超链接，并且 href 属性有效，链接文本不能为空。",
            hint: "示例: <a href='https://www.example.com' target='_blank'>访问示例网站</a>",
            validator: (doc) => {
                const links = doc.querySelectorAll('a');
                if (links.length === 0) return { ok: false, msg: "🔗 没有找到超链接标签 &lt;a&gt;。" };
                for (let link of links) {
                    if (!link.href || link.href === "" || link.innerText.trim() === "") 
                        return { ok: false, msg: "请检查链接的 href 属性和显示文本是否完整。" };
                }
                return { ok: true, msg: "🎉 超链接添加成功！现在你的网页可以跳转了！" };
            },
            defaultCode: `<h1>有趣的网站推荐</h1>\n<p>点击下方链接学习更多：</p>\n<a href="https://developer.mozilla.org/zh-CN/" target="_blank">MDN Web 文档</a>`
        },
        {   // 关卡 3
            name: "📋 列表元素",
            desc: "使用无序列表或有序列表。",
            goal: "页面中包含一个 &lt;ul&gt; 无序列表或 &lt;ol&gt; 有序列表，并且列表内至少有两个 &lt;li&gt; 项目。",
            hint: "用 <ul><li>第一项</li><li>第二项</li></ul> 创建一个列表。",
            validator: (doc) => {
                const lists = doc.querySelectorAll('ul, ol');
                if (lists.length === 0) return { ok: false, msg: "📃 未找到列表（ul 或 ol），请添加列表。" };
                let hasLi = false;
                for (let list of lists) {
                    const items = list.querySelectorAll('li');
                    if (items.length >= 2) { hasLi = true; break; }
                }
                if (!hasLi) return { ok: false, msg: "列表至少需要包含两个 <li> 项目，让内容更丰富。" };
                return { ok: true, msg: "🎉 列表很棒！你已经掌握HTML列表结构！" };
            },
            defaultCode: `<h1>学习科目</h1>\n<ul>\n  <li>HTML 基础</li>\n  <li>CSS 样式</li>\n  <li>JavaScript 交互</li>\n</ul>`
        },
        {   // 关卡 4
            name: "🎨 样式与内联style",
            desc: "给元素添加简单颜色样式。",
            goal: "页面至少有一个元素使用了 style 属性，改变文字颜色或者背景色。比如标题变蓝色。",
            hint: "使用 style 属性: <h1 style='color:blue;'>蓝色标题</h1>",
            validator: (doc) => {
                const allElements = doc.querySelectorAll('*');
                let hasInlineStyle = false;
                for (let el of allElements) {
                    if (el.hasAttribute && el.hasAttribute('style') && el.getAttribute('style').trim() !== "") {
                        hasInlineStyle = true;
                        break;
                    }
                }
                if (!hasInlineStyle) return { ok: false, msg: "🎨 需要使用 style 属性为某个元素添加颜色或背景。试着将标题改成蓝色或红色。" };
                return { ok: true, msg: "🎉 太棒了！你已经学会了基础的内联样式，网页变得更生动。" };
            },
            defaultCode: `<h1 style="color:#2c5f2d;">我的森林之旅</h1>\n<p style="font-size:18px;">绿色主题，护眼又清新！</p>`
        }
    ];

    // ------------------ 全局状态 ------------------
    let currentLevelIndex = 0;       // 0-based
    let completedLevels = new Array(levels.length).fill(false);
    const STORAGE_KEY = 'html_adventure_progress';

    // DOM 元素
    const levelsContainer = document.getElementById('levelsContainer');
    const missionDescDiv = document.getElementById('missionDescription');
    const missionGoalDiv = document.getElementById('missionGoal');
    const hintBox = document.getElementById('hintBox');
    const codeEditor = document.getElementById('codeEditor');
    const previewFrame = document.getElementById('previewFrame');
    const feedbackDiv = document.getElementById('feedbackMsg');
    const runBtn = document.getElementById('runBtn');
    const checkBtn = document.getElementById('checkBtn');
    const resetCodeBtn = document.getElementById('resetCodeBtn');
    const globalLevelBadge = document.getElementById('globalLevelBadge');

    // 加载存档
    function loadProgress() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.completed && Array.isArray(data.completed)) {
                    for (let i=0; i<Math.min(data.completed.length, levels.length); i++) {
                        completedLevels[i] = data.completed[i];
                    }
                }
                if (typeof data.currentLevel === 'number' && data.currentLevel >= 0 && data.currentLevel < levels.length) {
                    currentLevelIndex = data.currentLevel;
                } else {
                    currentLevelIndex = 0;
                }
            } catch(e) { console.warn(e); }
        }
        // 确保第一次解锁第一关, 如果第一关未完成但是第二关莫名其妙解锁? 逻辑: 关卡i可解锁条件是 i===0 或 completedLevels[i-1]===true
        // 处理边界: 如果当前level被锁，则回退到最近可玩的
        if (currentLevelIndex > 0 && !completedLevels[currentLevelIndex-1]) {
            // 回退到第一个未完成的关卡
            for (let i=0; i<levels.length; i++) {
                if (i===0) { currentLevelIndex = 0; break; }
                if (!completedLevels[i-1]) { currentLevelIndex = i; break; }
            }
        }
        // 保存一致性
        saveProgress();
    }

    function saveProgress() {
        const toSave = {
            completed: completedLevels,
            currentLevel: currentLevelIndex
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    }

    // 解锁并更新UI (关卡解锁状态)
    function unlockNextLevel() {
        // 若当前关卡完成，且下一关存在，则自动允许访问(UI解锁)
        if (completedLevels[currentLevelIndex] && currentLevelIndex+1 < levels.length) {
            // 无需额外动作，只是渲染时可以点击
        }
        renderLevelsList();
        saveProgress();
    }

    // 完成当前关卡 (由验证通过后调用)
    function completeCurrentLevel() {
        if (completedLevels[currentLevelIndex]) return; // 已经完成
        completedLevels[currentLevelIndex] = true;
        saveProgress();
        renderLevelsList();
        // 显示成功讯息并自动跳到下一关（如果存在）
        if (currentLevelIndex + 1 < levels.length) {
            feedbackDiv.innerHTML = `<span>🎉 恭喜过关！解锁下一关 🎉</span>`;
            // 自动跳转到下一关
            setTimeout(() => {
                setCurrentLevel(currentLevelIndex + 1);
            }, 1200);
        } else {
            feedbackDiv.innerHTML = `<span>🏆 恭喜你完成了全部关卡！成为HTML新手大师！ 🏆</span>`;
        }
    }

    // 切换关卡
    function setCurrentLevel(index) {
        if (index < 0 || index >= levels.length) return;
        // 检查是否解锁: index==0 或者 前一关已完成
        if (index !== 0 && !completedLevels[index-1]) {
            feedbackDiv.innerHTML = `<span class="error-feedback">🔒 这一关尚未解锁，请先完成前一关！</span>`;
            setTimeout(() => { if(feedbackDiv) feedbackDiv.innerHTML = ''; }, 1500);
            return;
        }
        currentLevelIndex = index;
        saveProgress();
        renderLevelsList();
        loadLevelData();
        // 重置反馈
        feedbackDiv.innerHTML = '';
        // 如果当前关卡代码编辑器暂无专用存储，从关卡默认代码加载 (如有保存过场景可另做，简单起见用默认重置)
        const level = levels[currentLevelIndex];
        codeEditor.value = level.defaultCode || `<h1>欢迎来到第${currentLevelIndex+1}关</h1>\n<p>编写你的HTML吧！</p>`;
        // 自动运行一次预览
        runPreview();
    }

    // 加载当前关卡的文本说明
    function loadLevelData() {
        const level = levels[currentLevelIndex];
        missionDescDiv.innerHTML = `<strong>${level.name}</strong><br>${level.desc}`;
        missionGoalDiv.innerHTML = `🎯 目标：${level.goal}`;
        hintBox.innerHTML = `💡 提示：${level.hint}`;
        globalLevelBadge.innerText = `第${currentLevelIndex+1}关 · ${level.name}`;
    }

    // 预览 (将编辑器代码渲染到iframe)
    function runPreview() {
        let code = codeEditor.value;
        // 基础安全包装，确保html结构完整
        let fullHtml = code;
        if (!/<!DOCTYPE html>/i.test(code) && !/<html/i.test(code)) {
            fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>预览</title><style>body{font-family:sans-serif;padding:20px;}</style></head><body>${code}</body></html>`;
        }
        previewFrame.srcdoc = fullHtml;
        return fullHtml;
    }

    // 验证逻辑
    function validateMission() {
        const fullHtml = runPreview();  // 更新预览的同时获取html
        // 创建临时dom解析验证
        const parser = new DOMParser();
        const doc = parser.parseFromString(fullHtml, 'text/html');
        const level = levels[currentLevelIndex];
        const result = level.validator(doc);
        if (result.ok) {
            feedbackDiv.innerHTML = `<div class="success-feedback" style="padding:8px;border-radius:12px;">✅ ${result.msg}</div>`;
            if (!completedLevels[currentLevelIndex]) {
                completeCurrentLevel();
            } else {
                feedbackDiv.innerHTML += `<div>✨ 关卡已完成，继续挑战新关卡吧～</div>`;
            }
        } else {
            feedbackDiv.innerHTML = `<div class="error-feedback" style="padding:8px;border-radius:12px;">❌ ${result.msg}</div>`;
        }
    }

    // 重置当前关卡代码
    function resetCode() {
        codeEditor.value = levels[currentLevelIndex].defaultCode;
        runPreview();
        feedbackDiv.innerHTML = "↻ 已重置为关卡示例代码。";
        setTimeout(() => {
            if(feedbackDiv.innerHTML === "↻ 已重置为关卡示例代码。") feedbackDiv.innerHTML = '';
        }, 1500);
    }

    // 渲染关卡列表
    function renderLevelsList() {
        levelsContainer.innerHTML = '';
        levels.forEach((level, idx) => {
            const card = document.createElement('div');
            card.className = 'level-card';
            if (completedLevels[idx]) card.classList.add('completed');
            if (idx === currentLevelIndex) card.classList.add('active');
            // 锁定逻辑: 非0且前一关未完成 -> locked
            let isLocked = (idx !== 0 && !completedLevels[idx-1]);
            if (isLocked) card.classList.add('locked');
            const statusIcon = completedLevels[idx] ? '✅' : (idx === currentLevelIndex ? '⚡' : (isLocked ? '🔒' : '📘'));
            card.innerHTML = `<div class="level-title"><span class="status-icon">${statusIcon}</span> ${level.name}</div>`;
            if (!isLocked) {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setCurrentLevel(idx);
                });
            } else {
                card.style.cursor = 'not-allowed';
            }
            levelsContainer.appendChild(card);
        });
    }

    // 额外保存编辑器内容(可选，用户每次切换关卡默认重置为默认；但若你想保留编辑可使用，不过简单重置让体验一致)
    // 监听运行
    runBtn.addEventListener('click', () => {
        runPreview();
        feedbackDiv.innerHTML = '👀 预览已更新，继续编写代码吧！';
        setTimeout(() => {
            if(feedbackDiv.innerHTML === '👀 预览已更新，继续编写代码吧！') feedbackDiv.innerHTML = '';
        }, 1200);
    });
    checkBtn.addEventListener('click', validateMission);
    resetCodeBtn.addEventListener('click', resetCode);

    // 初始化
    function init() {
        loadProgress();
        renderLevelsList();
        setCurrentLevel(currentLevelIndex);
        runPreview();
    }

    init();
</script>
</body>
</html>
